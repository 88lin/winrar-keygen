          }

      - name: Integrate vcpkg
        run: vcpkg integrate install

      - name: Build
        run: |
          msbuild winrar-keygen.vcxproj /p:Configuration=Release /p:Platform=ARM64 /p:VcpkgEnableManifest=true /p:VcpkgManifestInstall=false

